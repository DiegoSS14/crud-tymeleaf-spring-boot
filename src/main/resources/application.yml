spring:
  application:
    name: 'thymeleaf'

  # Config Database
  datasource: 
    url: jdbc:mysql://localhost:3306/thymeleaf_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: mysql

  # Config JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: true