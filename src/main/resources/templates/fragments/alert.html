
<section th:if="${success} != null">
    <div class="flex items-center justify-between bg-green-500 text-white px-2 py-1 rounded-sm" id="successAlert">
        <span th:text="${success}">success</span>
        <button class="cursor-pointer" onclick="closeSuccessAlert()">x</button>
    </div>
</section>

<section th:if="${fail} != null">
    <div class="flex items-center justify-between bg-red-500 text-white px-2 py-1 rounded-sm" id="errorAlert">
        <span th:text="${fail}">fail</span>
        <button class="cursor-pointer" onclick="closeFailAlert()">x</button>
    </div>
</section>

<script>    
    function closeSuccessAlert() {
        let alert = document.getElementById('successAlert')
        alert.classList.add('hidden')
    }

    function closeFailAlert() {
        let alert = document.getElementById('errorAlert')
        alert.classList.add('hidden')
    }
</script>
