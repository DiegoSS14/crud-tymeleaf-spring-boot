<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout}">

<head>
	<meta charset="UTF-8" />
</head>

<body>
	<section layout:fragment="corpo">

		<section class="layout-content">

			<div class="container" id="listagem">
				<nav
					class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-gray-200 pb-5 mb-8">
					<div class="flex items-center gap-2 text-gray-500">
						<i class="oi oi-caret-right text-xs"></i>
						<h1 class="text-xl font-semibold text-gray-900">Lista de Departamentos</h1>
					</div>
					<a class="inline-flex items-center gap-2 bg-indigo-600 rounded-lg px-4 py-2 text-sm font-medium text-white shadow-xs hover:bg-indigo-700 transition"
						href="/departamentos/cadastrar" role="button">
						<span class="oi oi-plus" aria-hidden="true"></span>
						<span>Novo Departamento</span>
					</a>
				</nav>
			</div>

			<div class="table-responsive">
				<table class="table table-striped table-hover table-sm">
					<thead>
						<tr>
							<th>#</th>
							<th>Nome</th>
							<th>Ação</th>
						</tr>
					</thead>
					<tbody class="divide-y divide-gray-100 text-gray-700">
						<tr>
							<td>3</td>
							<td>Administração</td>
							<td colspan="2">
								<a class="btn btn-info btn-sm" href="/departamentos/editar/3" role="button">
									<span class="oi oi-brush" title="Editar" aria-hidden="true"></span>
								</a>
								<button id="btn_departamentos/excluir/3" type="button" class="btn btn-danger btn-sm">
									<span class="oi oi-circle-x" title="Exclusão desabilitada"
										aria-hidden="true"></span>
								</button>
							</td>
						</tr>
						<tr>
							<td>2</td>
							<td>Contabilidade</td>
							<td colspan="2">
								<a class="btn btn-info btn-sm" href="/departamentos/editar/2" role="button">
									<span class="oi oi-brush" title="Editar" aria-hidden="true"></span>
								</a>
								<button type="button" class="btn btn-danger btn-sm">
									<span class="oi oi-circle-x" title="Exclusão desabilitada"
										aria-hidden="true"></span>
								</button>
							</td>
						</tr>
						<tr>
							<td>1</td>
							<td>Recursos Humanos</td>
							<td colspan="2">
								<a class="btn btn-info btn-sm" href="/departamentos/editar/1" role="button">
									<span class="oi oi-brush" title="Editar" aria-hidden="true"></span>
								</a>
								<button type="button" class="btn btn-danger btn-sm">
									<span class="oi oi-circle-x" title="Exclusão desabilitada"
										aria-hidden="true"></span>
								</button>
							</td>
						</tr>
						<tr>
							<td>4</td>
							<td>Tecnologia da Informação</td>
							<td colspan="2">
								<a class="btn btn-info btn-sm" href="/departamentos/editar/4" role="button">
									<span class="oi oi-brush" title="Editar" aria-hidden="true"></span>
								</a>
								<button type="button" class="btn btn-danger btn-sm">
									<span class="oi oi-circle-x" title="Exclusão desabilitada"
										aria-hidden="true"></span>
								</button>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
			</div>
		</section>
		</div>
	</section>
</body>

</html>
