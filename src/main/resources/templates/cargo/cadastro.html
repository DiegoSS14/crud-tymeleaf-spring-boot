<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8" />
</head>

<body>
    <section layout:fragment="corpo">

        <!-- CONTENT AREA -->
        <main class="flex-1 p-6 lg:p-10 w-full overflow-x-hidden">

            <!-- Sub-Header / Breadcrumb -->
            <div
                class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-gray-200 pb-5 mb-8">
                <div class="flex items-center gap-2 text-gray-500">
                    <i class="oi oi-caret-right text-xs"></i>
                    <h1 class="text-xl font-semibold text-gray-900">Cadastrar Cargos</h1>
                </div>
                <a class="inline-flex items-center gap-2 bg-white border border-gray-300 rounded-lg px-4 py-2 text-sm font-medium text-gray-700 shadow-xs hover:bg-gray-50 transition"
                    href="/cargos/listar" role="button">
                    <span class="oi oi-spreadsheet" aria-hidden="true"></span>
                    <span>Listar Cargos</span>
                </a>
            </div>

            <div th:replace="fragments/alert">alert</div>

            <!-- Form Card Container -->
            <div class="bg-white border border-gray-200 rounded-xl shadow-xs p-6 max-w-3xl">
                <form th:action="@{/cargos/salvar}" method="POST" class="space-y-6" th:object="${cargo}">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Input Nome -->
                        <div class="flex flex-col gap-1.5">
                            <label for="nome" class="text-sm font-medium text-gray-700">Nome do Cargo</label>
                            <input type="text" id="nome" name="nome" placeholder="Ex: Analista de Sistemas" th:field="${cargo.name}"
                                autofocus="autofocus" value=""
                                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-xs focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-hidden transition" />
                        </div>

                        <!-- Select Departamento -->
                        <div class="flex flex-col gap-1.5">
                            <label for="departamento" class="text-sm font-medium text-gray-700">Departamento</label>
                            <select id="departamento" name="departamento"
                                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-xs focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-hidden transition bg-white">
                                <option value="">Selecione...</option>
                                <option th:each="d : ${departamentos}" th:value="${d.id}" th:text="${d.name}">Departamento</option>
                            </select>
                        </div>
                    </div>

                    <input type="hidden" id="id" name="id" value="" />

                    <!-- Submit Button -->
                    <div class="pt-2 border-t border-gray-100 flex justify-end">
                        <button type="submit"
                            class="bg-indigo-600 text-white font-medium text-sm px-5 py-2.5 rounded-lg shadow-sm hover:bg-indigo-500 focus:outline-hidden focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition cursor-pointer">
                            Salvar Cargo
                        </button>
                    </div>
                </form>
            </div>
        </main>

        </div>

    </section>
</body>

</html>
