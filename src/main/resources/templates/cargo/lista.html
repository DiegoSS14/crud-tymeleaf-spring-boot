<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8" />
</head>

<body>
    <section layout:fragment="corpo">

        <main class="flex-1 p-6 lg:p-10 w-full overflow-x-hidden">

            <div
                class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-gray-200 pb-5 mb-8">
                <div class="flex items-center gap-2 text-gray-500">
                    <i class="oi oi-caret-right text-xs"></i>
                    <h1 class="text-xl font-semibold text-gray-900">Lista de Cargos</h1>
                </div>
                <a class="inline-flex items-center gap-2 bg-indigo-600 rounded-lg px-4 py-2 text-sm font-medium text-white shadow-xs hover:bg-indigo-700 transition"
                    href="/cargos/cadastrar" role="button">
                    <span class="oi oi-plus" aria-hidden="true"></span>
                    <span>Novo Cargo</span>
                </a>
            </div>

            <div th:replace="~{fragments/alert}">alert</div>

            <div class="bg-white border border-gray-200 rounded-xl shadow-xs overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 font-medium">
                                <th class="px-6 py-3 w-16">#</th>
                                <th class="px-6 py-3">Cargo</th>
                                <th class="px-6 py-3">Departamento</th>
                                <th class="px-6 py-3 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-gray-700">
                            <tr th:each="c : ${cargos}">
                                <td class="px-6 py-3.5 font-medium" th:text="${c.id}">1</td>
                                <td class="px-6 py-3.5" th:text="${c.name}">Auxiliar Contábil</td>
                                <td class="px-6 py-3.5" th:text="${c.departamento.name}">Contabilidade</td>
                                <td class="px-6 py-3.5 text-right space-x-1">
                                    <a class="inline-flex p-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-md transition"
                                        href="/cargos/editar/1" role="button">
                                        <span class="oi oi-brush text-xs" title="Editar" aria-hidden="true"></span>
                                    </a>
                                    <button type="button"
                                        class="inline-flex p-1.5 bg-red-50 text-red-400 cursor-not-allowed rounded-md"
                                        disabled>
                                        <span class="oi oi-circle-x text-xs" title="Exclusão desabilitada"
                                            aria-hidden="true"></span>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>

        </div>

    </section>
</body>

</html>
